version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mightytechx-server
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - CLIENT_ORIGIN=http://localhost:5173
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - RECIPIENT_EMAIL=${RECIPIENT_EMAIL}
    env_file:
      - server/.env
