<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Mighty TechX Pvt Ltd delivers innovative digital solutions including web and mobile app development, cloud services, UI/UX design, Microsoft Dynamics 365, business strategy, HR solutions, motion graphics, and end-to-end IT support to help businesses scale and succeed." />
  <title>Mighty TechX</title>

  <!-- Preconnect to external origins so DNS + TLS are resolved before requests fire -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

  <!-- Google Fonts — display=swap prevents invisible text during load -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@1,500;1,700&display=swap"
    rel="stylesheet" />

  <!-- Font Awesome — loaded async so it never blocks first paint -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print"
    onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
